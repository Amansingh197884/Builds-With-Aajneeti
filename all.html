<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trusted By Section - Professional</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-blue: #2A73C0;
            --text-dark: #212529;
            --bg-light: #ffffff;
            --card-bg: #fdfdfd; /* Light background for logo boxes */
            --border-color: #e9ecef; /* Subtle border color */
        }

        body {
            background-color: var(--bg-light);
            font-family: 'Inter', sans-serif;
        }

        .trusted-section {
            padding: 80px 0;
        }

        /* Heading */
        .section-title {
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 800;
            color: var(--text-dark);
            margin-bottom: 50px;
            font-size: clamp(1.2rem, 5vw, 1.6rem); /* Responsive font size */
            animation: fadeInDown 0.8s ease-out forwards;
        }

        .section-title span {
            color: var(--primary-blue);
        }

        /* Logo Card Styling */
        .logo-card {
            background-color: var(--card-bg); /* Background color */
            border: 1px solid var(--border-color); /* Border added */
            border-radius: 12px;
            padding: 30px; /* Padding inside the box */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 140px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            opacity: 0; 
            animation: fadeInUp 0.6s ease-out forwards;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02); /* Very light shadow */
        }

        .logo-card img {
            max-width: 100%;
            max-height: 80px;
            object-fit: contain;
            filter: grayscale(100%);
            opacity: 0.8;
            transition: all 0.3s ease;
        }

        /* Hover Animations */
        .logo-card:hover {
            transform: translateY(-8px);
            border-color: var(--primary-blue);
            background-color: #ffffff;
            box-shadow: 0 10px 20px rgba(0,0,0,0.08);
        }

        .logo-card:hover img {
            filter: grayscale(0%);
            opacity: 1;
            transform: scale(1.05);
        }

        /* Staggered Animation for smooth entrance */
        .col:nth-child(1) .logo-card { animation-delay: 0.1s; }
        .col:nth-child(2) .logo-card { animation-delay: 0.2s; }
        .col:nth-child(3) .logo-card { animation-delay: 0.3s; }
        .col:nth-child(4) .logo-card { animation-delay: 0.4s; }
        .col:nth-child(5) .logo-card { animation-delay: 0.5s; }
        .col:nth-child(6) .logo-card { animation-delay: 0.6s; }
        .col:nth-child(7) .logo-card { animation-delay: 0.7s; }
        .col:nth-child(8) .logo-card { animation-delay: 0.8s; }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Responsive adjustments */
        @media (max-width: 576px) {
            .logo-card { height: 110px; padding: 15px; }
        }
    </style>
</head>
<body>

<section class="trusted-section">
    <div class="container text-center">
        <h2 class="section-title">
            TRUSTED BY <span>INDUSTRY LEADERS & 1,000+ SME OWNERS</span>
        </h2>

        <div class="row row-cols-2 row-cols-md-4 g-4 mt-2">
            
            <div class="col">
                <div class="logo-card">
                    <img src="image/deno.png" alt="Hero">
                </div>
            </div>

            <div class="col">
                <div class="logo-card">
                    <img src="https://rahulmalodia.com/wp-content/uploads/2022/07/logo-1.png" alt="Rahul Malodia">
                </div>
            </div>

            <div class="col">
                <div class="logo-card">
                    <img src="https://snehdesai.com/wp-content/uploads/2020/06/Sneh-Desai-Logo.png" alt="Sneh Desai">
                </div>
            </div>

            <div class="col">
                <div class="logo-card">
                    <img src="https://dailynatural.in/wp-content/uploads/2021/04/dn-logo.png" alt="Daily Natural">
                </div>
            </div>

            <div class="col">
                <div class="logo-card">
                    <img src="https://via.placeholder.com/150x60?text=LX+GREEN" alt="LX Green">
                </div>
            </div>

            <div class="col">
                <div class="logo-card">
                    <img src="https://via.placeholder.com/150x60?text=Kishore+Chainani" alt="Dr Kishore Chainani">
                </div>
            </div>

            <div class="col">
                <div class="logo-card">
                    <img src="https://drnehamehta.com/wp-content/uploads/2021/01/neha-mehta-logo.png" alt="Dr Neha Mehta">
                </div>
            </div>

            <div class="col">
                <div class="logo-card">
                    <img src="https://via.placeholder.com/150x60?text=DENOTE" alt="Denote">
                </div>
            </div>

        </div>
    </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
